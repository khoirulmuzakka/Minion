name: CI

on:
  push:
    branches:
      - main
      - "feature/*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy build pybind11

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -G Ninja -B build -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_PYTHON=ON -DMINION_BUILD_CEC=ON -DMINION_BUILD_EXAMPLES=ON -DMINION_BUILD_TESTS=ON

      - name: Configure CMake (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_PYTHON=ON -DMINION_BUILD_CEC=ON -DMINION_BUILD_EXAMPLES=ON -DMINION_BUILD_TESTS=ON

      - name: Build C++ targets
        run: cmake --build build --target minion_test --target minionpycpp --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Inspect Python extension artifacts (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem minionpy\lib | Format-Table Name, Length

      - name: Inspect minionpycpp dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pyd = Get-ChildItem minionpy\lib\minionpycpp*.pyd | Select-Object -First 1
          dumpbin /dependents $pyd.FullName

      - name: Run Python tests
        run: python tests/test_minionpy.py

      - name: Python build
        run: python -m build

  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure package build
        run: cmake -B build-pkg -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_CEC=ON -DMINION_BUILD_PYTHON=OFF -DMINION_BUILD_EXAMPLES=OFF

      - name: Build package payload
        run: cmake --build build-pkg --config Release

      - name: Generate Debian package
        if: matrix.os == 'ubuntu-latest'
        run: cpack -G DEB --config CPackConfig.cmake
        working-directory: build-pkg

      - name: Upload Debian artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: minion-deb
          path: build-pkg/*.deb
          overwrite: true
          retention-days: 7

      - name: Generate macOS TGZ package
        if: matrix.os == 'macos-latest'
        run: cpack -G TGZ --config CPackConfig.cmake
        working-directory: build-pkg

      - name: Upload macOS TGZ artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: minion-macos-tgz
          path: build-pkg/*.tar.gz
          overwrite: true
          retention-days: 7
