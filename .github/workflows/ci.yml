name: CI

on:
  push:
    branches:
      - main
      - "feature/*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy build pybind11

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -G "Visual Studio 17 2022" -B build -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_PYTHON=ON -DMINION_BUILD_CEC=ON -DMINION_BUILD_EXAMPLES=ON -DMINION_BUILD_TESTS=ON

      - name: Configure CMake (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_PYTHON=ON -DMINION_BUILD_CEC=ON -DMINION_BUILD_EXAMPLES=ON -DMINION_BUILD_TESTS=ON

      - name: Build C++ targets
        run: cmake --build build --target minion_test --target minionpycpp --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Run Python tests
        run: python tests/test_minionpy.py

      - name: Python build
        run: python -m build

  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            package_type: deb
          - os: macos-latest
            package_type: macos
            package_arch: arm64
          - os: macos-15-intel
            package_type: macos
            package_arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure package build
        run: cmake -B build-pkg -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_CEC=ON -DMINION_BUILD_PYTHON=OFF -DMINION_BUILD_EXAMPLES=OFF

      - name: Build package payload
        run: cmake --build build-pkg --config Release

      - name: Generate Debian package
        if: matrix.package_type == 'deb'
        run: cpack -G DEB --config CPackConfig.cmake
        working-directory: build-pkg

      - name: Upload Debian artifact
        if: matrix.package_type == 'deb'
        uses: actions/upload-artifact@v4
        with:
          name: minion-deb
          path: build-pkg/*.deb
          overwrite: true
          retention-days: 7

      - name: Generate macOS TGZ package
        if: matrix.package_type == 'macos'
        run: cpack -G TGZ --config CPackConfig.cmake
        working-directory: build-pkg

      - name: Rename macOS TGZ with architecture
        if: matrix.package_type == 'macos'
        run: |
          archive="$(ls build-pkg/*.tar.gz)"
          mv "$archive" "build-pkg/minion-${{ matrix.package_arch }}.tar.gz"

      - name: Upload macOS TGZ artifact
        if: matrix.package_type == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: minion-macos-tgz-${{ matrix.package_arch }}
          path: build-pkg/minion-${{ matrix.package_arch }}.tar.gz
          overwrite: true
          retention-days: 7
