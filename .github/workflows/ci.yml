name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"
          - os: macos-15-intel
            python-version: "3.9"
          - os: macos-15-intel
            python-version: "3.14"
          - os: windows-2022
            python-version: "3.9"
          - os: windows-2022
            python-version: "3.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy build pybind11

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -G "Visual Studio 17 2022" -B build -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_PYTHON=ON -DMINION_BUILD_BENCHMARK=ON -DMINION_BUILD_EXAMPLES=ON -DMINION_BUILD_TESTS=ON

      - name: Configure CMake (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_PYTHON=ON -DMINION_BUILD_BENCHMARK=ON -DMINION_BUILD_EXAMPLES=ON -DMINION_BUILD_TESTS=ON

      - name: Build C++ targets
        run: cmake --build build --target minion_test --target minionpycpp --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Run Python tests
        run: python tests/test_minionpy.py
        env:
          MINIONPY_IMPORT_MODE: local

      - name: Python build
        run: python -m build

  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            package_type: deb
            package_suffix: ""
          - os: macos-latest
            package_type: macos
            package_arch: arm64
            package_suffix: macos-arm64
          - os: macos-15-intel
            package_type: macos
            package_arch: x64
            package_suffix: macos-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure package build
        run: cmake -B build-pkg -S . -DCMAKE_BUILD_TYPE=Release -DMINION_BUILD_BENCHMARK=ON -DMINION_BUILD_PYTHON=OFF -DMINION_BUILD_EXAMPLES=OFF -DMINION_PACKAGE_SUFFIX="${{ matrix.package_suffix }}"

      - name: Build package payload
        run: cmake --build build-pkg --config Release

      - name: Generate Debian package
        if: matrix.package_type == 'deb'
        run: cpack -G DEB --config CPackConfig.cmake
        working-directory: build-pkg

      - name: Upload Debian artifact
        if: matrix.package_type == 'deb'
        uses: actions/upload-artifact@v4
        with:
          name: minion-deb
          path: build-pkg/*.deb
          overwrite: true
          retention-days: 1

      - name: Generate macOS TGZ package
        if: matrix.package_type == 'macos'
        run: cpack -G TGZ --config CPackConfig.cmake
        working-directory: build-pkg

      - name: Upload macOS TGZ artifact
        if: matrix.package_type == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: minion-macos-tgz-${{ matrix.package_arch }}
          path: build-pkg/*-${{ matrix.package_suffix }}.tar.gz
          overwrite: true
          retention-days: 1
